name = "ZhangYeung"
version = "0.1.0"
defaultTargets = ["ZhangYeung"]
lintDriver = "batteries/runLinter"
testDriver = "ZhangYeungTest"

# `-O0` cuts `leanc` compile time for Lean-side builds; the runtime cost is
# irrelevant for a proof library and a one-shot book-rendering executable.
# Matches the `leanprover/reference-manual` package configuration.
moreLeancArgs = ["-O0"]

[leanOptions]
# Pretty-prints `fun a ↦ b`
pp.unicode.fun = true
# Don't assume a typo is a new variable
autoImplicit = false
relaxedAutoImplicit = false
# Enable all mathlib linters: automatically matches what mathlib uses.
weak.linter.mathlibStandardSet = true
# Project convention: no hard line-length limit in Lean sources or comments.
weak.linter.style.longLine = false

[[require]]
name = "PFR"
git = "https://github.com/teorth/pfr"
rev = "80daaf1"

[[lean_lib]]
name = "ZhangYeung"

[[lean_lib]]
name = "ZhangYeungTest"
